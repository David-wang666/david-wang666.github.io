<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>David - 个人电子名片</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f8f9fa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .card {
            background-color: white;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            overflow: hidden;
            text-align: center;
            padding: 40px 20px;
        }
        
        .avatar-container {
            width: 120px;
            height: 120px;
            margin: 0 auto 25px;
            border-radius: 50%;
            overflow: hidden;
            border: 4px solid #fff;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }
        
        .avatar {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .name {
            font-size: 28px;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 15px;
        }
        
        .bio {
            font-size: 16px;
            color: #7f8c8d;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        
        .social-links {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }
        
        .social-link {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: #ecf0f1;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: #7f8c8d;
            transition: all 0.3s ease;
        }
        
        .social-link:hover {
            background-color: #3498db;
            color: white;
            transform: translateY(-3px);
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="avatar-container">
            <img src="https://t2.chatglm.cn/file/6a3d274c8afe0570118ac0bd.jpg?expired_at=1782824708&sign=2afb9c7e22e0dc5cf1c9aa2ca7293163&ext=jpg" alt="David" class="avatar">
        </div>
        <h1 class="name">David</h1>
        <p class="bio">我是一个专业打螺丝牛马</p>
        <div class="social-links">
            <a href="#" class="social-link">📧</a>
            <a href="#" class="social-link">💼</a>
            <a href="#" class="social-link">📱</a>
        </div>
    </div>
</body>
</html>
